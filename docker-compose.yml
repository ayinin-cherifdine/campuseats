version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: campuseats
      POSTGRES_USER: campuseats
      POSTGRES_PASSWORD: campuseats_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campuseats"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: campuseats
      MINIO_ROOT_PASSWORD: campuseats_minio_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"    # MinIO web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ── Django REST backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # gunicorn avec --reload pour le rechargement automatique des fichiers
    # Gunicorn sert les fichiers avec Accept-Ranges + Content-Length, requis par iOS AVPlayer
    command: gunicorn campuseats.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload --reload-extra-file /app/campuseats/settings.py
    environment:
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DB_NAME: campuseats
      DB_USER: campuseats
      DB_PASSWORD: campuseats_secret
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8081"
      # MinIO désactivé en dev local → stockage fichiers local (media_data)
      # MINIO_ENDPOINT: minio:9000
      # MINIO_ACCESS_KEY: campuseats
      # MINIO_SECRET_KEY: campuseats_minio_secret
      # MINIO_BUCKET_NAME: campuseats-media
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media

  # ── Nginx (serves Expo web build + proxies /api to backend) ────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  media_data:
