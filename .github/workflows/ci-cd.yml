name: CI/CD — CampusEats

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ── Tests backend ─────────────────────────────────────────────────────────
  test-backend:
    name: Tests Django
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: campuseats_test
          POSTGRES_USER: campuseats
          POSTGRES_PASSWORD: test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: campuseats_test
      DB_USER: campuseats
      DB_PASSWORD: test_secret
      SECRET_KEY: test-secret-key-ci
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances
        run: pip install -r backend/requirements.txt

      - name: Appliquer les migrations
        run: |
          cd backend
          python manage.py migrate --noinput

      - name: Lancer les tests
        run: |
          cd backend
          python manage.py test --verbosity=2

  # ── Build images Docker ───────────────────────────────────────────────────
  build:
    name: Build images Docker
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Se connecter à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push — image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build et push — image frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          build-args: |
            EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Déploiement (main uniquement) ─────────────────────────────────────────
  deploy:
    name: Déploiement en production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Déployer sur le serveur via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            # Mettre à jour les images
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}/backend:latest
            docker pull ghcr.io/${{ github.repository }}/frontend:latest

            # Redémarrer les services
            docker compose pull
            docker compose up -d --no-build
            docker compose exec backend python manage.py migrate --noinput
            docker compose exec backend python manage.py collectstatic --noinput

            # Nettoyer les anciennes images
            docker image prune -f
