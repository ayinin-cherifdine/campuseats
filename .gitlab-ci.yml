stages:
  - test
  - build
  - push
  - deploy

variables:
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend

# ── Test ──────────────────────────────────────────────────────────────────────
test:backend:
  stage: test
  image: python:3.12-slim
  services:
    - name: postgres:16-alpine
      alias: db
  variables:
    DB_HOST: db
    DB_NAME: campuseats_test
    DB_USER: campuseats
    DB_PASSWORD: test_secret
    POSTGRES_DB: campuseats_test
    POSTGRES_USER: campuseats
    POSTGRES_PASSWORD: test_secret
    SECRET_KEY: test-secret-key
    DEBUG: "True"
    ALLOWED_HOSTS: "*"
    CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  before_script:
    - pip install -r backend/requirements.txt
  script:
    - cd backend
    - python manage.py migrate --noinput
    - python manage.py test --verbosity=2

# ── Build ─────────────────────────────────────────────────────────────────────
build:backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $BACKEND_IMAGE:$CI_COMMIT_SHA ./backend
    - docker tag $BACKEND_IMAGE:$CI_COMMIT_SHA $BACKEND_IMAGE:latest
  only:
    - main
    - develop

build:frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
        --build-arg EXPO_PUBLIC_API_URL=$EXPO_PUBLIC_API_URL
        -t $FRONTEND_IMAGE:$CI_COMMIT_SHA
        -f Dockerfile.frontend .
    - docker tag $FRONTEND_IMAGE:$CI_COMMIT_SHA $FRONTEND_IMAGE:latest
  only:
    - main
    - develop

# ── Push ──────────────────────────────────────────────────────────────────────
push:images:
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHA
    - docker push $BACKEND_IMAGE:latest
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHA
    - docker push $FRONTEND_IMAGE:latest
  only:
    - main

# ── Deploy ────────────────────────────────────────────────────────────────────
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        export CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE &&
        export CI_COMMIT_SHA=$CI_COMMIT_SHA &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker-compose -f docker-compose.prod.yml pull &&
        docker-compose -f docker-compose.prod.yml up -d --remove-orphans &&
        docker image prune -f
      "
  environment:
    name: production
    url: http://$DEPLOY_HOST
  only:
    - main
